<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calgentic AI | Login</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --border-color: #334155;
            --primary: #8b5cf6;
            --secondary: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-box {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { margin-top: 0; font-size: 28px; background: linear-gradient(90deg, var(--secondary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .error { color: #f87171; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Calgentic Login</h2>
    <p style="color:var(--text-muted); font-size:14px;">CEO/Admin Login Supported</p>
    <input type="text" id="mobile" placeholder="Mobile Number (or 'admin')">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Sign In</button>
    <div id="errorMsg" class="error">Invalid credentials</div>
</div>

<script>
    async function login() {
        const m = document.getElementById('mobile').value;
        const p = document.getElementById('password').value;
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ mobile_number: m, password: p })
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('calgentic_token', data.token);
            localStorage.setItem('calgentic_role', data.role);
            localStorage.setItem('calgentic_user_id', data.user_id || 'admin');
            
            if (data.role === 'CEO') {
                window.location.href = '/ceo_dashboard.html';
            } else {
                window.location.href = '/index.html';
            }
        } else {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').innerText = data.error;
        }
    }
</script>

</body>
</html>
